name: Build Gophish Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        arch: [amd64]
        include:
          - os: windows-latest
            goos: windows
            bin: "gophish.exe"
            releaseos: windows
          - os: ubuntu-latest
            goos: linux
            bin: "gophish"
            releaseos: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        run: go build -o ${{ matrix.bin }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1

      - name: Prepare artifact name (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: echo "RELEASE=gophish-${{ github.event.release.tag_name }}-${{ matrix.releaseos }}-64bit" >> $GITHUB_ENV

      - name: Prepare artifact name (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: echo "RELEASE=gophish-${{ github.event.release.tag_name }}-${{ matrix.releaseos }}-64bit" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE }}
          path: ${{ matrix.bin }}
          retention-days: 1

  package:
    name: Package Assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Create release packages
        run: |
          mkdir -p releases
          for dir in bin/*; do
            for file in $dir/*; do
              binname=$(basename "$file")
              release_name=$(basename "$dir")
              cp "$file" .
              zip -r "releases/${release_name}.zip" \
                "$binname" \
                static/js/dist \
                static/js/src/vendor/ckeditor \
                static/css/dist \
                static/images \
                static/font \
                static/db \
                db \
                templates \
                README.md \
                VERSION \
                LICENSE \
                config.json
              rm "$binname"
            done
          done

      - name: Generate SHA256 checksums
        run: |
          cd releases
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: releases/
          retention-days: 1

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: releases
          path: releases/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/*.zip
            releases/SHA256SUMS
